services:
  postgres:
    image: postgres:16-alpine
    container_name: orderscrm_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crm_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.orderscrm.service=postgres"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orderscrm_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - crm_network
    restart: unless-stopped
    depends_on:
      - postgres
    labels:
      - "com.orderscrm.service=pgadmin"

  nginx:
    image: nginx:alpine
    container_name: orderscrm_nginx
    env_file:
      - .env
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certs:/etc/nginx/certs:ro
    networks:
      - crm_network
    restart: unless-stopped
    depends_on:
      - postgres
    labels:
      - "com.orderscrm.service=nginx"

  # Backend service (uncomment after building)
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: orderscrm_backend
  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #   networks:
  #     - crm_network
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   labels:
  #     - "com.orderscrm.service=backend"

  registry:
    image: registry:2
    container_name: orderscrm_registry
    env_file:
      - .env
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Docker Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/registry.htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry_data:/var/lib/registry
      - ./registry/auth:/auth
    ports:
      - "8080:5000"
    networks:
      - crm_network
    restart: unless-stopped
    labels:
      - "com.orderscrm.service=registry"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: orderscrm_watchtower
    env_file:
      - .env
    environment:
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE}
      - WATCHTOWER_CLEANUP=${WATCHTOWER_CLEANUP}
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - crm_network
    restart: unless-stopped
    labels:
      - "com.orderscrm.service=watchtower"

networks:
  crm_network:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  pgadmin_data:
  registry_data:
  certs: