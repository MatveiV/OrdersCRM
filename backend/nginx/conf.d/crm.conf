server {
    listen 80;
    server_name orderscrm.ru www.orderscrm.ru 185.87.48.13;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API - only through localhost/internal network (backend not running yet)
    location /api/ {
        return 503 "Backend service not configured";
    }

    # Health check endpoint
    location /health {
        return 200 "Nginx is running, but backend is not configured yet\n";
    }

    # Block direct access to backend from external
    location /backend/ {
        return 403;
    }
}

# Internal-only server (not exposed to outside)
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    location / {
        return 403;
    }
}